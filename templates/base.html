<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NephroCare AI - CKD Prediction{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .risk-high { color: #dc3545; }
        .risk-medium { color: #fd7e14; }
        .risk-low { color: #28a745; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-heartbeat me-2"></i>NephroCare AI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navmenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Assessment</a></li>
                <li class="nav-item"><a class="nav-link" href="/clinical"><i class="fas fa-stethoscope me-1"></i>Clinical</a></li>
                <li class="nav-item"><a class="nav-link" href="/patient"><i class="fas fa-user me-1"></i>Patient Portal</a></li>
                <li class="nav-item"><a class="nav-link" href="/research"><i class="fas fa-flask me-1"></i>Research</a></li>
                <li class="nav-item"><a class="nav-link" href="/governance"><i class="fas fa-shield-alt me-1"></i>Governance</a></li>
            </ul>
        </div>
    </div>
</nav>
<main>
{% block content %}{% endblock %}
</main>
<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 NephroCare AI &mdash; For clinical decision support only. Not a substitute for professional medical advice.</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
